<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | حسابي وطلباتي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        warning: { 500: '#F59E0B' },
                        error: { 500: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style> body { background-color: #F9FAFB; } </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <script src="../../components/app-state.js"></script>
    <script src="../../components/ui-feedback.js"></script>
    <script src="../../components/main-navbar.js"></script>

    <main class="container mx-auto px-4 lg:px-8 py-12 flex-1 max-w-4xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">سجل طلباتي</h1>
            <button type="button" onclick="logout()" class="bg-red-50 text-error-500 hover:bg-error-500 hover:text-white px-4 py-2 rounded-md font-semibold transition-colors">
                <i class="fas fa-sign-out-alt ml-1"></i> تسجيل الخروج
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">بيانات الحساب</h2>
            <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="first_name" class="px-4 py-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-primary-500" placeholder="الاسم الأول">
                <input id="last_name" class="px-4 py-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-primary-500" placeholder="الاسم الأخير">
                <input id="phone" class="px-4 py-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-primary-500" placeholder="رقم الهاتف">
                <input id="birthdate" type="date" class="px-4 py-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                <input id="city" class="px-4 py-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-primary-500" placeholder="المدينة">
                <input id="country" class="px-4 py-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-primary-500" placeholder="الدولة">
                <textarea id="address" class="md:col-span-2 px-4 py-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-primary-500" placeholder="العنوان"></textarea>
                <button type="submit" class="md:col-span-2 bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-lg transition">حفظ البيانات</button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-900 mb-4">قائمة الأمنيات</h2>
            <div id="wishlistContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <p class="text-gray-500">جاري تحميل قائمة الأمنيات...</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <div id="ordersContainer" class="space-y-6">
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                    <p>جاري تحميل طلباتك...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api';

        // دالة الحماية من ثغرات XSS
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function getToken() {
            return window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token');
        }

        async function fetchProfile() {
            const token = getToken();
            if (!token) return;
            try {
                const response = await fetch(`${API_URL}/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                if (!response.ok || !data.success) return;
                const user = data.data || {};
                ['first_name', 'last_name', 'phone', 'birthdate', 'city', 'country', 'address'].forEach(id => {
                    const element = document.getElementById(id);
                    if (element) element.value = user[id] || '';
                });
            } catch (error) {}
        }

        async function fetchWishlist() {
            const token = getToken();
            const container = document.getElementById('wishlistContainer');
            if (!token) return;
            try {
                const response = await fetch(`${API_URL}/wishlist`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                const items = data.data || [];
                if (items.length === 0) {
                    container.innerHTML = '<p class="text-gray-500">لا توجد منتجات في قائمة الأمنيات حتى الآن.</p>';
                    return;
                }
                container.innerHTML = items.map(item => `
                    <div class="border border-gray-100 rounded-lg p-4 flex gap-3 items-center">
                        <img src="${item.image_url ? window.location.origin + item.image_url : 'https://via.placeholder.com/80'}" class="w-16 h-16 object-contain bg-gray-50 rounded">
                        <div class="flex-1 min-w-0">
                            <a href="../products/product.html?id=${item.id}" class="font-bold text-gray-800 hover:text-primary-600 line-clamp-1">${escapeHTML(item.title)}</a>
                            <p class="text-primary-600 font-bold">${item.price || 0} ج.م</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<p class="text-error-500">تعذر تحميل قائمة الأمنيات.</p>';
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async event => {
            event.preventDefault();
            const token = getToken();
            const body = {};
            ['first_name', 'last_name', 'phone', 'birthdate', 'city', 'country', 'address'].forEach(id => body[id] = document.getElementById(id).value.trim());
            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                if (window.AppUI) window.AppUI.toast(data.message || (response.ok ? 'تم حفظ البيانات' : 'تعذر حفظ البيانات'), response.ok ? 'success' : 'error');
            } catch (error) {
                if (window.AppUI) window.AppUI.toast('تعذر الاتصال بالسيرفر', 'error');
            }
        });

        async function fetchMyOrders() {
            const token = localStorage.getItem('spider_token');
            if (!token) {
                window.location.href = '../auth/login.html';
                return;
            }

            const container = document.getElementById('ordersContainer');

            try {
                const response = await fetch(`${API_URL}/orders/history`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    renderOrders(data.data || []);
                } else {
                    container.innerHTML = `<p class="text-center text-error-500 font-bold">${escapeHTML(data.message) || 'خطأ في جلب الطلبات'}</p>`;
                }
            } catch (error) {
                container.innerHTML = '<p class="text-center text-error-500 font-bold">خطأ في الاتصال بالسيرفر.</p>';
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-box-open text-6xl text-gray-200 mb-4"></i>
                        <p class="text-gray-500 text-lg">لم تقم بإجراء أي طلبات حتى الآن.</p>
                        <a href="../../index.html" class="inline-block mt-4 bg-primary-50 text-primary-600 px-6 py-2 rounded-full font-bold hover:bg-primary-500 hover:text-white transition">تصفح المنتجات</a>
                    </div>`;
                return;
            }

            let html = '';
            
            // حل مشكلة الـ TODO: استخدام [...orders] عشان نمنع تعديل المصفوفة الأصلية
            [...orders].reverse().forEach(order => {
                let statusBadge = '';
                switch(order.status) {
                    case 'Pending': statusBadge = '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">قيد المراجعة</span>'; break;
                    case 'Processing': statusBadge = '<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">جاري التجهيز</span>'; break;
                    case 'Shipped': statusBadge = '<span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold">في الطريق إليك</span>'; break;
                    case 'Delivered': statusBadge = '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">تم التوصيل</span>'; break;
                    case 'Cancelled': statusBadge = '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">ملغي</span>'; break;
                    default: statusBadge = `<span class="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-xs font-bold">${escapeHTML(order.status) || 'Pending'}</span>`;
                }

                const orderDate = new Date(order.created_at).toLocaleDateString('ar-EG');
                
                // استخدام دالة الحماية لتنظيف العنوان
                const safeAddress = escapeHTML(order.shipping_address);

                html += `
                    <div class="border border-gray-200 rounded-lg p-5 hover:border-primary-500 transition-colors">
                        <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-4 border-b border-gray-100 pb-4">
                            <div>
                                <h3 class="font-bold text-gray-900">طلب رقم #${order.id}</h3>
                                <p class="text-sm text-gray-500"><i class="far fa-calendar-alt ml-1"></i> ${orderDate}</p>
                            </div>
                            <div class="text-left">
                                ${statusBadge}
                            </div>
                        </div>
                        
                        <div class="flex justify-between items-end mt-4">
                            <div class="text-sm text-gray-600 max-w-[70%]">
                                <strong class="block mb-1">عنوان الشحن:</strong> 
                                <span class="leading-relaxed">${safeAddress}</span>
                            </div>
                            <div class="text-left min-w-fit">
                                <p class="text-sm text-gray-500 mb-1">الإجمالي</p>
                                <p class="font-bold text-lg text-primary-600">${order.total_amount || '0'} ج.م</p>
                                ${['Pending', 'Processing'].includes(order.status || 'Pending') ? `<button type="button" onclick="cancelMyOrder(${order.id})" class="mt-3 text-sm bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-md font-bold transition">إلغاء الطلب</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function logout() {
            if (window.AppState) {
                window.AppState.clearToken();
                window.AppState.clearCart();
            } else {
                localStorage.removeItem('spider_token');
                localStorage.removeItem('spider_cart');
            }
            window.location.href = '../../index.html';
        }

        // حل مشكلة الـ TODO: استخدام addEventListener
        async function cancelMyOrder(orderId) {
            const ok = window.AppUI ? await window.AppUI.modal({
                type: 'warning',
                title: 'إلغاء الطلب',
                message: 'يمكن إلغاء الطلب قبل الشحن فقط. هل تريد المتابعة؟',
                showCancel: true,
                confirmText: 'إلغاء الطلب',
                cancelText: 'رجوع'
            }) : true;
            if (!ok) return;

            try {
                const response = await fetch(`${API_URL}/orders/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
                    body: JSON.stringify({ order_id: orderId })
                });
                const data = await response.json();
                if (window.AppUI) window.AppUI.toast(data.message || (response.ok ? 'تم إلغاء الطلب' : 'تعذر إلغاء الطلب'), response.ok ? 'success' : 'error');
                fetchMyOrders();
            } catch (error) {
                if (window.AppUI) window.AppUI.toast('خطأ في الاتصال بالسيرفر', 'error');
            }
        }

        window.addEventListener('load', () => {
            fetchProfile();
            fetchWishlist();
            fetchMyOrders();
        });
    </script>
</body>
</html>
