<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | تقييمات منتجاتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Cairo','sans-serif']}}}}</script>
    <style>body{background:#f8fafc}</style>
</head>
<body id="seller-layout" class="font-sans text-slate-800 antialiased flex flex-col md:flex-row min-h-screen">
    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-200 pb-4 mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-slate-950">تقييمات منتجاتي</h1>
                <p class="text-slate-500 mt-1">تقييمات العملاء على المنتجات التي تملكها فقط.</p>
            </div>
            <button type="button" onclick="fetchReviews()" class="bg-white border border-slate-200 hover:bg-slate-50 px-4 py-2 rounded-md font-bold flex items-center gap-2"><i class="fas fa-rotate"></i> تحديث</button>
        </header>

        <section id="reviewsContainer" class="grid grid-cols-1 xl:grid-cols-2 gap-4">
            <p class="p-10 bg-white border border-slate-100 rounded-lg text-center text-cyan-600 font-bold">جاري التحميل...</p>
        </section>
    </main>

    <script src="../../components/app-state.js"></script>
    <script src="../../components/seller-sidebar.js"></script>
    <script>
        loadSellerSidebar('reviews');
        const API_URL = '/api';
        const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem('spider_token') || localStorage.getItem('token'));
        const escapeHTML = value => String(value || '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));

        function logout() {
            if (window.AppState) window.AppState.clearToken();
            else {
                localStorage.removeItem('spider_token');
                localStorage.removeItem('token');
            }
            window.location.href = '../auth/login.html';
        }

        async function fetchReviews() {
            const container = document.getElementById('reviewsContainer');
            container.innerHTML = '<p class="p-10 bg-white border border-slate-100 rounded-lg text-center text-cyan-600 font-bold">جاري التحميل...</p>';
            try {
                const response = await fetch(`${API_URL}/seller/reviews`, { headers: { Authorization: `Bearer ${token}` } });
                const result = await response.json();
                if (!response.ok || !result.success) throw new Error(result.message || 'Forbidden');
                renderReviews(result.data || []);
            } catch (error) {
                container.innerHTML = '<p class="p-10 bg-white border border-red-100 rounded-lg text-center text-red-600 font-bold">غير مسموح بتحميل تقييمات البائع.</p>';
            }
        }

        function stars(rating) {
            const value = Math.max(0, Math.min(5, Number(rating || 0)));
            return Array.from({ length: 5 }, (_, index) => `<i class="fas fa-star ${index < value ? 'text-amber-400' : 'text-slate-200'}"></i>`).join('');
        }

        function renderReviews(reviews) {
            const container = document.getElementById('reviewsContainer');
            if (!reviews.length) {
                container.innerHTML = '<p class="p-12 bg-white border border-slate-100 rounded-lg text-center text-slate-500 xl:col-span-2">لا توجد تقييمات بعد.</p>';
                return;
            }

            container.innerHTML = reviews.map(review => `
                <article class="bg-white border border-slate-100 rounded-lg shadow-sm p-5">
                    <div class="flex items-start justify-between gap-4 mb-4">
                        <div>
                            <h2 class="font-extrabold text-slate-950">${escapeHTML(review.product_title)}</h2>
                            <p class="text-sm text-slate-500">${escapeHTML(review.customer_name)}</p>
                        </div>
                        <div class="text-sm whitespace-nowrap">${stars(review.rating)}</div>
                    </div>
                    <p class="text-slate-700 leading-7">${escapeHTML(review.comment || 'بدون تعليق')}</p>
                    ${review.reply ? `<div class="mt-4 bg-cyan-50 text-cyan-800 border border-cyan-100 rounded-md p-3 text-sm"><strong>ردك:</strong> ${escapeHTML(review.reply)}</div>` : ''}
                </article>
            `).join('');
        }

        fetchReviews();
    </script>
</body>
</html>
