<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | لوحة التحكم - إضافة منتج جديد</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 100: '#CFFAFE', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 500: '#F59E0B' },
                        success: { 50: '#F0FDF4', 500: '#22C55E', 700: '#15803D' },
                        error: { 50: '#FEF2F2', 500: '#EF4444', 700: '#B91C1C' },
                        warning: { 50: '#FFFBEB', 500: '#F59E0B', 700: '#B45309' },
                        info: { 50: '#EFF6FF', 500: '#3B82F6', 700: '#1D4ED8' }
                    }
                }
            }
        }
    </script>
    <style> 
        body { background-color: #F8FAFC; } 
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body id="admin-layout" class="font-sans text-gray-800 antialiased flex flex-col md:flex-row min-h-screen">

    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden transition-all duration-300 relative custom-scrollbar">
        
        <div id="toast" class="absolute top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-lg shadow-lg font-bold text-sm md:text-base transition-all duration-300 opacity-0 pointer-events-none -translate-y-4">
            <i id="toastIcon" class="fas"></i>
            <span id="toastMessage">رسالة الإشعار هنا</span>
        </div>

        <header class="mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900">إضافة منتج جديد</h1>
            <p class="text-gray-500 mt-1 text-sm md:text-base">أدخل تفاصيل المنتج وارفع الصور ليظهر فوراً في المتجر.</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 w-full max-w-5xl mx-auto">
            <form id="addProductForm" onsubmit="handleAddProduct(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">اسم المنتج <span class="text-error-500">*</span></label>
                        <input type="text" id="title" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">السعر الأساسي (ج.م) <span class="text-error-500">*</span></label>
                        <input type="number" id="price" required min="1" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">نسبة الخصم (%) <span class="text-gray-400 font-normal text-xs">(اختياري)</span></label>
                        <input type="number" id="discount" min="0" max="100" placeholder="مثال: 15" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">الكمية المتاحة (Stock) <span class="text-error-500">*</span></label>
                        <input type="number" id="stock" required min="0" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">العلامة التجارية (Brand) <span class="text-gray-400 font-normal text-xs">(اختياري)</span></label>
                        <input type="text" id="brand" placeholder="مثال: سوني، سامسونج" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">القسم (Category) <span class="text-error-500">*</span></label>
                        <div class="relative">
                            <select id="category_id" required class="appearance-none w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base cursor-pointer">
                                <option value="" disabled selected>جاري تحميل الأقسام...</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-4 text-gray-500">
                                <i class="fas fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 bg-primary-50/50 p-5 rounded-xl border border-primary-100">
                    <div>
                        <label class="block text-sm font-bold text-gray-800 mb-2">الصورة الأساسية <span class="text-error-500">*</span></label>
                        <input type="file" id="main_image" accept="image/*" required class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-primary-50 file:text-primary-700 hover:file:bg-primary-100 cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-800 mb-2">صور إضافية <span class="text-gray-500 font-normal text-xs">(للسلايدر الداخلي)</span></label>
                        <input type="file" id="additional_images" accept="image/*" multiple class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-white file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">الكلمات الدلالية (Tags) <span class="text-gray-400 font-normal text-xs">(مفصولة بفاصلة)</span></label>
                    <input type="text" id="tags" list="tagsList" placeholder="مثال: ألعاب, بلايستيشن, أجهزة ذكية" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base">
                    <datalist id="tagsList"></datalist>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold text-gray-700 mb-2">وصف المنتج</label>
                    <textarea id="description" rows="5" placeholder="اكتب تفاصيل ومواصفات المنتج هنا..." class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition bg-gray-50 focus:bg-white text-sm md:text-base resize-y"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full md:w-auto bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 text-lg">
                    <i class="fas fa-plus-circle"></i> حفظ ونشر المنتج
                </button>
            </form>
        </div>
    </main>

    <script src="../../components/app-state.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script>
        if(typeof loadAdminSidebar === 'function') loadAdminSidebar('add-product');
        const API_URL = '/api';

        // دالة تسجيل الخروج المطلوبة للشريط الجانبي الموحد
        function logout() {
            if (window.AppState) window.AppState.clearToken();
            else localStorage.removeItem('spider_token');
            window.location.href = '../auth/login.html';
        }

        // نظام إشعارات مطور وموحد
        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            // إزالة الكلاسات السابقة
            toast.className = 'absolute top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-lg shadow-lg font-bold text-sm md:text-base transition-all duration-300';
            toastIcon.className = 'fas text-lg';

            if (type === 'success') {
                toast.classList.add('bg-success-50', 'text-success-700', 'border', 'border-success-200');
                toastIcon.classList.add('fa-check-circle');
            } else if (type === 'error') {
                toast.classList.add('bg-error-50', 'text-error-700', 'border', 'border-error-200');
                toastIcon.classList.add('fa-exclamation-circle');
            }

            toastMessage.textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
            }, 4000);
        }

        // دالة جلب الأقسام
        async function fetchCategoriesForSelect() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const data = await response.json();
                const selectElement = document.getElementById('category_id');
                
                if (data.success && data.data.length > 0) {
                    selectElement.innerHTML = '<option value="" disabled selected>اختر القسم المناسب...</option>';
                    data.data.forEach(cat => {
                        selectElement.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                    });
                } else {
                    selectElement.innerHTML = '<option value="" disabled selected>لا توجد أقسام (قم بإضافتها أولاً)</option>';
                }
            } catch (error) {
                document.getElementById('category_id').innerHTML = '<option value="" disabled selected>خطأ في تحميل الأقسام</option>';
                showToast('حدث خطأ أثناء تحميل الأقسام', 'error');
            }
        }

        async function fetchTagsForSelect() {
            try {
                const response = await fetch(`${API_URL}/tags`);
                const data = await response.json();
                const tags = data.data || [];
                document.getElementById('tagsList').innerHTML = tags.map(tag => `<option value="${tag.name}"></option>`).join('');
            } catch (error) {}
        }

        window.addEventListener('load', () => {
            fetchCategoriesForSelect();
            fetchTagsForSelect();
        });

        async function handleAddProduct(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const token = localStorage.getItem('spider_token') || localStorage.getItem('token');

            if (!token) {
                showToast('يرجى تسجيل الدخول أولاً', 'error');
                setTimeout(() => window.location.href = '../auth/login.html', 1500);
                return;
            }

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('discount', document.getElementById('discount').value || 0);
            formData.append('stock_quantity', document.getElementById('stock').value);
            formData.append('brand', document.getElementById('brand').value);
            formData.append('category_id', document.getElementById('category_id').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('description', document.getElementById('description').value);

            // رفع الصور
            const mainImage = document.getElementById('main_image').files[0];
            if (mainImage) {
                formData.append('images', mainImage); 
            }

            const additionalImages = document.getElementById('additional_images').files;
            for (let i = 0; i < additionalImages.length; i++) {
                formData.append('images', additionalImages[i]);
            }

            // تغيير حالة الزر أثناء الرفع
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري الرفع والحفظ...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData 
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showToast('تم إضافة المنتج إلى المتجر بنجاح!', 'success');
                    document.getElementById('addProductForm').reset(); 
                    document.getElementById('category_id').value = ''; 
                    fetchTagsForSelect();
                } else {
                    showToast(data.message || 'حدث خطأ أثناء إضافة المنتج', 'error');
                }
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر، تأكد من تشغيل الخادم', 'error');
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
