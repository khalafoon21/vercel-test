<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | لوحة التحكم - إدارة المستخدمين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 100: '#CFFAFE', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 500: '#F59E0B' },
                        success: { 50: '#F0FDF4', 500: '#22C55E', 700: '#15803D' },
                        error: { 50: '#FEF2F2', 500: '#EF4444', 700: '#B91C1C' },
                        warning: { 50: '#FFFBEB', 500: '#F59E0B', 700: '#B45309' },
                        info: { 50: '#EFF6FF', 500: '#3B82F6', 700: '#1D4ED8' }
                    }
                }
            }
        }
    </script>
    <style> 
        body { background-color: #F8FAFC; } 
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body id="admin-layout" class="font-sans text-gray-800 antialiased flex flex-col md:flex-row min-h-screen">

    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden transition-all duration-300 relative custom-scrollbar">
        
        <div id="toast" class="absolute top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-lg shadow-lg font-bold text-sm md:text-base transition-all duration-300 opacity-0 pointer-events-none -translate-y-4">
            <i id="toastIcon" class="fas"></i>
            <span id="toastMessage">رسالة الإشعار هنا</span>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900">إدارة المستخدمين</h1>
                <p class="text-gray-500 mt-1 text-sm md:text-base">تحكم في صلاحيات الأعضاء (مستخدم عادي، بائع، أدمن).</p>
            </div>
            <button type="button" onclick="fetchUsers()" class="bg-primary-50 text-primary-600 hover:bg-primary-100 px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> تحديث البيانات
            </button>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full overflow-hidden">
            <div class="p-4 border-b border-gray-50 bg-gray-50/50 flex justify-between items-center">
                <h2 class="font-bold text-gray-700">قائمة الأعضاء</h2>
                <span id="userCount" class="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-bold">0 مستخدم</span>
            </div>
            <div class="overflow-x-auto w-full custom-scrollbar">
                <table class="w-full text-right border-collapse min-w-[800px]">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm font-bold uppercase tracking-wider">
                        <tr>
                            <th class="p-5 whitespace-nowrap w-20">ID</th>
                            <th class="p-5 whitespace-nowrap">الاسم</th>
                            <th class="p-5 whitespace-nowrap">البريد الإلكتروني</th>
                            <th class="p-5 whitespace-nowrap">الدور الحالي</th>
                            <th class="p-5 whitespace-nowrap text-center">تعديل الصلاحية</th>
                        </tr>
                    </thead>
                    <tbody id="usersContainer" class="divide-y divide-gray-100 text-sm md:text-base">
                        <tr>
                            <td colspan="5" class="p-12 text-center text-primary-600">
                                <i class="fas fa-circle-notch fa-spin text-4xl mb-3"></i>
                                <p class="font-semibold">جاري تحميل المستخدمين...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../components/app-state.js"></script>
    <script src="../../components/admin-sidebar.js"></script>
    <script>
        if(typeof loadAdminSidebar === 'function') loadAdminSidebar('users');
        const API_URL = '/api';

        function logout() {
            if (window.AppState) window.AppState.clearToken();
            else localStorage.removeItem('spider_token');
            window.location.href = '../../index.html'; // كما في كودك القديم
        }

        // نظام إشعارات مطور
        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toast.className = 'absolute top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-lg shadow-lg font-bold text-sm md:text-base transition-all duration-300';
            toastIcon.className = 'fas text-lg';

            if (type === 'success') {
                toast.classList.add('bg-success-50', 'text-success-700', 'border', 'border-success-200');
                toastIcon.classList.add('fa-check-circle');
            } else if (type === 'error') {
                toast.classList.add('bg-error-50', 'text-error-700', 'border', 'border-error-200');
                toastIcon.classList.add('fa-exclamation-circle');
            }

            toastMessage.textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
            }, 3000);
        }

        async function fetchUsers() {
            const container = document.getElementById('usersContainer');
            const token = localStorage.getItem('spider_token');
            
            if (!token) return window.location.href = '../auth/login.html';

            container.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-primary-600"><i class="fas fa-circle-notch fa-spin text-4xl mb-3"></i><p class="font-semibold">جاري تحديث البيانات...</p></td></tr>`;

            try {
                // استخدام المسار الصحيح للباك إند بناءً على كودك
                const response = await fetch(`${API_URL}/admin/users`, { 
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    renderUsers(data.data || data.users || []);
                } else {
                    container.innerHTML = `<tr><td colspan="5" class="text-center text-error-500 p-12 bg-error-50 font-bold rounded-lg"><i class="fas fa-lock text-3xl mb-3 block"></i> خطأ: ${data.message || 'لست بصلاحية أدمن'}</td></tr>`;
                }
            } catch (error) {
                container.innerHTML = `<tr><td colspan="5" class="text-center text-error-500 p-12 bg-error-50 font-bold rounded-lg"><i class="fas fa-wifi text-3xl mb-3 block"></i> خطأ في الاتصال بالسيرفر</td></tr>`;
            }
        }

        function renderUsers(users) {
            const container = document.getElementById('usersContainer');
            document.getElementById('userCount').textContent = `${users.length} مستخدم`;

            if (users.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="p-16 text-center text-gray-400 bg-gray-50"><i class="fas fa-users-slash text-5xl mb-4"></i><br><p class="text-lg font-semibold">لا يوجد مستخدمين مسجلين.</p></td></tr>`;
                return;
            }

            let html = '';
            users.forEach(user => {
                // تحديد شكل الـ Badge بناءً على الصلاحية
                let roleBadge = '';
                let iconClass = '';
                
                if (user.role === 'admin') {
                    roleBadge = '<span class="bg-error-50 text-error-700 border border-error-200 px-3 py-1 rounded-full text-xs font-bold">مدير (Admin)</span>';
                    iconClass = 'fas fa-user-shield text-error-600 bg-error-50';
                } else if (user.role === 'seller') {
                    roleBadge = '<span class="bg-info-50 text-info-700 border border-info-200 px-3 py-1 rounded-full text-xs font-bold">بائع (Seller)</span>';
                    iconClass = 'fas fa-store text-info-600 bg-info-50';
                } else {
                    roleBadge = '<span class="bg-gray-100 text-gray-700 border border-gray-200 px-3 py-1 rounded-full text-xs font-bold">مستخدم (Customer)</span>';
                    iconClass = 'fas fa-user text-gray-500 bg-gray-100';
                }

                // تحديد العنصر المختار في قائمة التعديل
                const normalizedRole = user.role === 'customer' ? 'user' : user.role;
                const isCustomer = normalizedRole === 'user' ? 'selected' : '';
                const isSeller = normalizedRole === 'seller' ? 'selected' : '';
                const isAdmin = normalizedRole === 'admin' ? 'selected' : '';

                html += `
                    <tr class="hover:bg-gray-50 transition group">
                        <td class="p-5 font-bold text-gray-500">
                            <span class="bg-white border border-gray-200 px-2 py-1 rounded text-xs">#${user.id}</span>
                        </td>
                        <td class="p-5 font-bold text-gray-800 flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm shadow-sm border border-transparent group-hover:border-gray-200 ${iconClass}">
                                <i class="${iconClass.split(' ')[0]} ${iconClass.split(' ')[1]}"></i>
                            </div>
                            ${user.first_name || user.username || 'بدون اسم'}
                        </td>
                        <td class="p-5 text-gray-600 font-medium tracking-wide" dir="ltr">${user.email}</td>
                        <td class="p-5">${roleBadge}</td>
                        <td class="p-5 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <div class="relative w-full max-w-[140px]">
                                    <select id="role-${user.id}" class="appearance-none outline-none w-full text-sm font-bold border px-3 py-2 rounded-lg cursor-pointer transition shadow-sm bg-white pr-8 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-gray-700">
                                        <option value="user" ${isCustomer}>مستخدم</option>
                                        <option value="seller" ${isSeller}>بائع</option>
                                        <option value="admin" ${isAdmin}>مدير</option>
                                    </select>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500 opacity-70">
                                        <i class="fas fa-chevron-down text-xs"></i>
                                    </div>
                                </div>
                                <button type="button" onclick="updateUserRole(${user.id})" class="text-primary-600 hover:text-white hover:bg-primary-600 bg-primary-50 border border-primary-100 h-9 w-10 rounded-lg transition shadow-sm flex items-center justify-center" title="حفظ التعديل">
                                    <i class="fas fa-save"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = html;
        }

        async function updateUserRole(userId) {
            const token = localStorage.getItem('spider_token');
            const newRole = document.getElementById(`role-${userId}`).value;

            try {
                // استخدام المسار والمتغيرات الصحيحة بناءً على كودك
                const response = await fetch(`${API_URL}/admin/users/role`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ user_id: userId, new_role: newRole })
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showToast('تم تحديث صلاحية المستخدم بنجاح', 'success');
                    fetchUsers(); // لإعادة تحميل الألوان والبيانات
                } else {
                    showToast(data.message || 'عذراً، غير مصرح لك بتعديل الصلاحيات', 'error');
                }
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر، يرجى المحاولة لاحقاً', 'error');
            }
        }

        window.onload = fetchUsers;
    </script>
</body>
</html>
