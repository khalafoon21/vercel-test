<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | سلة المشتريات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        error: { 500: '#EF4444', 100: '#FEE2E2', 600: '#DC2626' },
                        success: { 500: '#22C55E', 100: '#DCFCE7', 600: '#16A34A' }
                    }
                }
            }
        }
    </script>
    <style> 
        body { background-color: #F9FAFB; } 
        .smooth-transition { transition: all 0.2s ease-out; }
        @keyframes shrinkProgress { from { width: 100%; } to { width: 0%; } }
        .animate-progress { animation: shrinkProgress 3s linear forwards; }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <script src="../../components/app-state.js"></script>
    <script src="../../components/ui-feedback.js"></script>
    <script src="../../components/main-navbar.js"></script>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none" aria-live="polite"></div>

    <main class="container mx-auto px-4 lg:px-8 py-12 flex-1 mt-6">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">سلة المشتريات</h1>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-2/3 bg-white rounded-xl shadow-sm border border-gray-100 p-6 relative">
                
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/70 backdrop-blur-sm z-10 flex items-center justify-center rounded-xl">
                    <i class="fas fa-circle-notch fa-spin text-4xl text-primary-500"></i>
                </div>

                <div id="cartItemsContainer" class="space-y-6">
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                        <p>جاري تحميل السلة من الخادم...</p>
                    </div>
                </div>
            </div>

            <div id="orderSummary" class="lg:w-1/3 bg-white rounded-xl shadow-sm border border-gray-100 p-6 h-fit hidden sticky top-24">
                <h2 class="text-xl font-bold text-gray-900 mb-6">ملخص الطلب</h2>
                
                <div class="flex justify-between mb-4 text-gray-600">
                    <span>المجموع الفرعي:</span>
                    <span id="subtotal" class="font-bold text-gray-900">0 ج.م</span>
                </div>
                <div class="flex justify-between mb-4 text-gray-600">
                    <span>مصاريف الشحن:</span>
                    <span class="font-bold text-gray-900">50 ج.م</span>
                </div>
                
                <hr class="my-4 border-gray-200">
                
                <div class="flex justify-between mb-6 text-lg">
                    <span class="font-bold text-gray-900">الإجمالي الكلي:</span>
                    <span id="total" class="font-bold text-primary-600">0 ج.م</span>
                </div>

                <button type="button" onclick="goToCheckout()" class="w-full bg-secondary-500 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-md shadow-sm smooth-transition text-lg">
                    إتمام الطلب
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api';
        const BASE_SERVER = window.location.origin;
        let serverCart = [];
        const escapeHTML = str => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
        const safeNumber = value => Number.isFinite(Number(value)) ? Number(value) : 0;
        const safeId = value => String(value || '').replace(/[^0-9]/g, '');
        const buildImageUrl = imagePath => {
            const cleanPath = String(imagePath || '').trim();
            if (!cleanPath) return 'https://via.placeholder.com/150?text=No+Image';
            return /^https?:\/\//i.test(cleanPath) ? cleanPath : `${BASE_SERVER}${cleanPath.startsWith('/') ? cleanPath : `/${cleanPath}`}`;
        };

        function getToken() {
            return window.AppState ? window.AppState.getToken() : (localStorage.getItem('spider_token') || localStorage.getItem('token'));
        }

        function checkAuth() {
            if (!getToken()) {
                return false;
            }
            return true;
        }

        // 1. جلب السلة من الباك اند (بدون LocalStorage وبدون جلب المنتجات)
        async function initCart() {
            if (!checkAuth()) {
                await initGuestCart();
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/cart`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });

                if (!res.ok) throw new Error('فشل جلب البيانات');

                const cartData = await res.json();
                
                // دعم أشكال استجابة الباك اند المختلفة
                serverCart = cartData.data || cartData.cart || [];
                if (!Array.isArray(serverCart) && Array.isArray(cartData)) {
                    serverCart = cartData;
                }

                renderCart();
                
                // تحديث عداد الناف بار
                if (typeof updateGlobalCartCount === 'function') updateGlobalCartCount();
                
            } catch (error) {
                console.error(error);
                document.getElementById('cartItemsContainer').innerHTML = '<p class="text-center text-error-500 font-bold py-8">حدث خطأ في الاتصال بالخادم.</p>';
            }
        }

        async function initGuestCart() {
            let localCart = [];
            try { localCart = window.AppState ? window.AppState.getCart() : JSON.parse(localStorage.getItem('spider_cart') || '[]'); } catch (error) { localCart = []; }
            if (!Array.isArray(localCart) || localCart.length === 0) {
                serverCart = [];
                renderCart();
                return;
            }

            const items = [];
            for (const item of localCart) {
                const productId = Number(item.product_id || item.id);
                if (!productId) continue;
                try {
                    const response = await fetch(`${API_URL}/products/${productId}`);
                    const result = await response.json();
                    if (response.ok && result.success && result.data) {
                        const product = result.data;
                        const quantity = Math.max(1, Number(item.quantity || 1));
                        const price = Number(product.price || 0);
                        const discount = Number(product.discount || 0);
                        const finalPrice = discount > 0 ? price - (price * discount / 100) : price;
                        items.push({
                            product_id: product.id,
                            title: product.title,
                            image_url: product.image_url,
                            price: finalPrice,
                            quantity,
                            total_price: finalPrice * quantity
                        });
                    }
                } catch (error) {}
            }
            serverCart = items;
            renderCart();
            if (typeof updateGlobalCartCount === 'function') updateGlobalCartCount();
        }

        // 2. رسم السلة بناءً على الداتا اللي راجعة جاهزة من السيرفر
        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            const summary = document.getElementById('orderSummary');

            if (serverCart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-shopping-basket text-6xl text-gray-200 mb-4"></i>
                        <p class="text-gray-500 text-lg mb-6">سلة المشتريات فارغة!</p>
                        <a href="../../index.html" class="bg-primary-50 text-primary-600 px-6 py-2 rounded-full font-semibold hover:bg-primary-500 hover:text-white smooth-transition">تصفح المنتجات</a>
                    </div>
                `;
                summary.classList.add('hidden');
                return;
            }

            let html = '';
            let subtotalPrice = 0;

            serverCart.forEach((item) => {
                // الباك اند بيبعت الأسعار جاهزة
                const price = safeNumber(item.price);
                const quantity = Math.max(1, Math.floor(safeNumber(item.quantity)));
                const itemTotal = safeNumber(item.total_price || (price * quantity));
                subtotalPrice += itemTotal;

                // معالجة مسار الصورة
                const imagePath = item.image_url || '';
                const imageUrl = imagePath.trim() !== ''
                    ? (imagePath.startsWith('http') ? imagePath : `${BASE_SERVER}${imagePath}`)
                    : 'https://via.placeholder.com/150?text=No+Image';

                // تحديد الـ ID (بعض الباك اند بيسميه id والبعض product_id)
                const pId = safeId(item.product_id || item.id);
                if (!pId) return;

                html += `
                    <div class="flex items-center gap-4 border-b border-gray-100 pb-6 last:border-0 last:pb-0">
                        <img src="${buildImageUrl(item.image_url)}" alt="${escapeHTML(item.title) || 'Product'}" class="w-24 h-24 object-cover rounded-md bg-gray-50 border border-gray-200">
                        <div class="flex-1">
                            <a href="../products/product.html?id=${pId}" class="hover:text-primary-600">
                                <h3 class="font-bold text-gray-800 text-lg line-clamp-1">${escapeHTML(item.title) || 'Product'}</h3>
                            </a>
                            <p class="text-primary-600 font-bold mt-1">${price.toFixed(0)} ج.م</p>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 px-3 py-1 rounded-full border border-gray-200">
                            <button type="button" onclick="event.preventDefault(); event.stopPropagation(); updateQuantity(${pId}, ${quantity}, 1)" class="w-6 h-6 flex items-center justify-center text-gray-600 hover:text-primary-600"><i class="fas fa-plus text-xs"></i></button>
                            <span class="font-bold w-4 text-center text-sm">${quantity}</span>
                            <button type="button" onclick="event.preventDefault(); event.stopPropagation(); updateQuantity(${pId}, ${quantity}, -1)" class="w-6 h-6 flex items-center justify-center text-gray-600 hover:text-error-500"><i class="fas fa-minus text-xs"></i></button>
                        </div>
                        <button type="button" onclick="event.preventDefault(); event.stopPropagation(); removeItem(${pId})" class="text-gray-400 hover:text-error-500 p-2 smooth-transition ml-2 text-lg">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });

            container.innerHTML = html;
            summary.classList.remove('hidden');

            document.getElementById('subtotal').textContent = `${subtotalPrice.toFixed(0)} ج.م`;
            document.getElementById('total').textContent = `${(subtotalPrice + 50).toFixed(0)} ج.م`;
        }

        // 3. تحديث الكمية في السيرفر مباشرة
        async function updateQuantity(productId, currentQty, change) {
            const newQty = currentQty + change;
            if (newQty < 1) return; // لا يمكن أن تكون الكمية أقل من 1

            if (!getToken()) {
                updateGuestCartQuantity(productId, newQty);
                await initGuestCart();
                return;
            }

            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');

            try {
                // استدعاء الباك اند
                const res = await fetch(`${API_URL}/cart/update`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ product_id: parseInt(productId), quantity: newQty })
                });

                const data = await res.json();
                
                if (res.ok && data.success !== false) {
                    await initCart(); // إعادة تحميل السلة من السيرفر لعرض الإجمالي الصحيح
                } else {
                    showToast(data.message || 'فشل تحديث الكمية (قد لا يتوفر مخزون كافي)', 'error');
                }
            } catch (error) {
                showToast('حدث خطأ أثناء تحديث الكمية', 'error');
            } finally {
                overlay.classList.add('hidden');
            }
        }

        // 4. حذف المنتج من السيرفر مباشرة
        async function removeItem(productId) {
            if (!getToken()) {
                updateGuestCartQuantity(productId, 0);
                showToast("تم إزالة المنتج من السلة");
                await initGuestCart();
                return;
            }

            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/cart/remove`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ product_id: parseInt(productId) })
                });

                const data = await res.json();
                
                if (res.ok && data.success !== false) {
                    showToast("تم إزالة المنتج من السلة");
                    await initCart(); // إعادة تحميل السلة
                } else {
                    showToast(data.message || 'فشل حذف المنتج', 'error');
                }
            } catch (error) {
                showToast('حدث خطأ أثناء حذف المنتج', 'error');
            } finally {
                overlay.classList.add('hidden');
            }
        }

        function updateGuestCartQuantity(productId, quantity) {
            if (window.AppState) {
                window.AppState.updateCartItem(productId, quantity);
                return;
            }
            let cart = [];
            try { cart = JSON.parse(localStorage.getItem('spider_cart') || '[]'); } catch (error) { cart = []; }
            cart = cart
                .map(item => Number(item.id || item.product_id) === Number(productId) ? { ...item, quantity } : item)
                .filter(item => Number(item.quantity || 0) > 0);
            localStorage.setItem('spider_cart', JSON.stringify(cart));
        }

        function goToCheckout() {
            if (!getToken()) {
                window.location.href = '../auth/login.html';
                return;
            }
            window.location.href = '../orders/checkout.html';
        }

        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            
            toast.className = `pointer-events-auto relative overflow-hidden bg-white/95 backdrop-blur-md border-r-4 ${isSuccess ? 'border-success-500' : 'border-error-500'} shadow-[0_8px_30px_rgb(0,0,0,0.12)] rounded-xl w-80 transform transition-all duration-500 translate-x-full opacity-0 flex p-4 items-center gap-4`;
            
            toast.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${isSuccess ? 'bg-success-100 text-success-600' : 'bg-error-100 text-error-600'}">
                    <i class="fas ${isSuccess ? 'fa-check' : 'fa-exclamation'} text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm">${isSuccess ? 'تم بنجاح' : 'تنبيه'}</h4>
                    <p class="text-xs text-gray-500 font-medium mt-0.5 leading-relaxed">${escapeHTML(message)}</p>
                </div>
            `;
            
            container.appendChild(toast);
            requestAnimationFrame(() => setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10));
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        window.onload = initCart;
    </script>
</body>
</html>
