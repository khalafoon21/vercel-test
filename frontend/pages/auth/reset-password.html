<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | كلمة مرور جديدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'] }, colors: { primary: { 600: '#0891B2', 700: '#0E7490' }, secondary: { 500: '#F59E0B' } } } } }
    </script>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <script src="../../components/ui-feedback.js"></script>
    <main class="bg-white border border-gray-100 rounded-xl shadow-sm w-full max-w-md p-8">
        <a href="../../index.html" class="block text-center text-3xl font-bold text-primary-600 mb-6">Spider<span class="text-secondary-500">Store</span></a>
        <h1 class="text-xl font-bold text-gray-800 mb-6 text-center">تعيين كلمة مرور جديدة</h1>
        <form id="resetForm" class="space-y-4">
            <input type="password" id="password" required minlength="6" placeholder="كلمة المرور الجديدة" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-600 outline-none">
            <input type="password" id="confirmPassword" required minlength="6" placeholder="تأكيد كلمة المرور" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-600 outline-none">
            <button id="submitBtn" type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-md transition">حفظ كلمة المرور</button>
        </form>
    </main>
    <script>
        const API_URL = '/api';
        const token = new URLSearchParams(window.location.search).get('token');
        document.getElementById('resetForm').addEventListener('submit', async event => {
            event.preventDefault();
            const password = document.getElementById('password').value;
            if (password !== document.getElementById('confirmPassword').value) {
                if (window.AppUI) window.AppUI.modal({ type: 'error', title: 'كلمة المرور غير متطابقة', message: 'اكتب نفس كلمة المرور في الحقلين.' });
                return;
            }
            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (window.AppUI) await window.AppUI.modal({ type: res.ok ? 'success' : 'error', title: res.ok ? 'تم التحديث' : 'تعذر التحديث', message: data.message || 'حاول مرة أخرى.' });
                if (res.ok) window.location.href = 'login.html';
            } catch (error) {
                if (window.AppUI) window.AppUI.modal({ type: 'error', title: 'خطأ اتصال', message: 'تأكد أن السيرفر يعمل ثم حاول مرة أخرى.' });
            }
        });
    </script>
</body>
</html>
