<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | استعادة كلمة المرور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'] }, colors: { primary: { 50: '#ECFEFF', 600: '#0891B2', 700: '#0E7490' }, secondary: { 500: '#F59E0B' } } } } }
    </script>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <script src="../../components/ui-feedback.js"></script>
    <main class="bg-white border border-gray-100 rounded-xl shadow-sm w-full max-w-md p-8">
        <a href="../../index.html" class="block text-center text-3xl font-bold text-primary-600 mb-6">Spider<span class="text-secondary-500">Store</span></a>
        <h1 class="text-xl font-bold text-gray-800 mb-2 text-center">استعادة كلمة المرور</h1>
        <p class="text-sm text-gray-500 text-center mb-6">اكتب بريدك وسنرسل رابط إعادة التعيين.</p>
        <form id="forgotForm" class="space-y-4">
            <input type="email" id="email" required dir="ltr" placeholder="example@email.com" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-600 outline-none">
            <button id="submitBtn" type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-md transition">إرسال الرابط</button>
        </form>
        <a href="login.html" class="block text-center mt-5 text-sm text-gray-500 hover:text-primary-600 font-bold">العودة لتسجيل الدخول</a>
    </main>
    <script>
        const API_URL = '/api';
        document.getElementById('forgotForm').addEventListener('submit', async event => {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';
            try {
                const res = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value.trim() })
                });
                const data = await res.json();
                if (window.AppUI) await window.AppUI.modal({ type: res.ok ? 'success' : 'error', title: res.ok ? 'تم الإرسال' : 'تعذر الإرسال', message: data.message || 'راجع البريد الإلكتروني.' });
            } catch (error) {
                if (window.AppUI) window.AppUI.modal({ type: 'error', title: 'خطأ اتصال', message: 'تأكد أن السيرفر يعمل ثم حاول مرة أخرى.' });
            } finally {
                btn.disabled = false;
                btn.textContent = 'إرسال الرابط';
            }
        });
    </script>
</body>
</html>
