<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | إنشاء حساب جديد</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        error: { 500: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style> body { background-color: #F9FAFB; } .smooth-transition { transition: all 0.2s ease-out; } </style>
</head>
<body class="font-sans text-gray-800 antialiased flex items-center justify-center min-h-screen relative overflow-hidden py-10">
    <script src="../../components/ui-feedback.js"></script>

    <div class="absolute top-0 right-0 w-64 h-64 bg-primary-50 rounded-bl-full -z-10 opacity-50"></div>
    <div class="absolute bottom-0 left-0 w-48 h-48 bg-primary-50 rounded-tr-full -z-10 opacity-50"></div>

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg border border-gray-100 z-10 mx-4">
        
        <div class="text-center mb-8">
            <a href="../../index.html" class="text-3xl font-bold tracking-wider text-primary-600 hover:text-primary-700 transition">
                Spider<span class="text-secondary-500">Store</span>
            </a>
            <h2 class="text-xl font-semibold mt-4 text-gray-700">إنشاء حساب جديد</h2>
            <p class="text-gray-500 text-sm mt-1">انضم إلينا وابدأ تجربة تسوق مميزة</p>
        </div>

        <div id="messageBox" class="hidden text-sm px-4 py-2 rounded-md mb-4 text-center font-bold transition-all"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">الاسم الأول <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="text" id="firstName" required placeholder="مثال: أحمد" 
                            class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
                        <i class="fas fa-user absolute right-3 top-3 text-gray-400"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">الاسم الأخير <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="text" id="lastName" required placeholder="مثال: محمد" 
                            class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 transition-colors">
                        <i class="fas fa-user absolute right-3 top-3 text-gray-400"></i>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">البريد الإلكتروني <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="email" id="email" required placeholder="user@example.com" 
                        class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 text-left transition-colors" dir="ltr">
                    <i class="fas fa-envelope absolute right-3 top-3 text-gray-400"></i>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">رقم الهاتف</label>
                <div class="relative">
                    <input type="tel" id="phone" placeholder="01xxxxxxxxx" 
                        class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 text-left transition-colors" dir="ltr">
                    <i class="fas fa-phone absolute right-3 top-3 text-gray-400"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">كلمة المرور <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 text-left transition-colors" dir="ltr">
                        <i class="fas fa-lock absolute right-3 top-3 text-gray-400"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">تأكيد المرور <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" required placeholder="••••••••" 
                            class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 text-left transition-colors" dir="ltr">
                        <i class="fas fa-lock absolute right-3 top-3 text-gray-400"></i>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-2.5 px-4 rounded-md shadow-sm smooth-transition flex items-center justify-center gap-2">
                <i class="fas fa-user-plus"></i> إنشاء الحساب
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            لديك حساب بالفعل؟ <a href="login.html" class="text-primary-600 hover:text-primary-700 font-bold transition-colors">تسجيل الدخول</a>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // 1. فحص هل المستخدم مسجل دخول بالفعل أم لا
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('spider_token')) {
                window.location.replace('../../index.html');
            }
        });

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('messageBox');
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                msgBox.className = 'block bg-error-50 text-error-600 border border-error-200 text-sm px-4 py-2 rounded-md mb-4 text-center font-bold';
                msgBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> كلمتا المرور غير متطابقتين!';
                return;
            }

            const userData = { first_name: firstName, last_name: lastName, email: email, phone: phone, password: password };

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء الحساب...';
            btn.disabled = true;
            msgBox.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    msgBox.className = 'block bg-success-50 text-success-600 border border-success-200 text-sm px-4 py-2 rounded-md mb-4 text-center font-bold';
                    msgBox.innerHTML = '<i class="fas fa-check-circle"></i> تم الإنشاء! جاري دخولك للمتجر...';
                    
                    if (data.activationUrl) {
                        if (window.AppUI) {
                            await window.AppUI.modal({
                                type: 'success',
                                title: 'تم إنشاء الحساب',
                                message: 'تم إرسال رابط التفعيل. في نسخة المشروع الحالية الرابط مطبوع في السيرفر ومتاح مباشرة للاختبار.',
                                confirmText: 'فتح رابط التفعيل'
                            });
                        }
                        await fetch(data.activationUrl);
                        window.location.replace('login.html');
                    } else {
                        window.location.replace('login.html');
                    }

                } else {
                    msgBox.className = 'block bg-error-50 text-error-600 border border-error-200 text-sm px-4 py-2 rounded-md mb-4 text-center font-bold';
                    msgBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${escapeHTML(data.message) || 'حدث خطأ أثناء التسجيل'}`;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
                    btn.disabled = false;
                }
            } catch (error) {
                msgBox.className = 'block bg-error-50 text-error-600 border border-error-200 text-sm px-4 py-2 rounded-md mb-4 text-center font-bold';
                msgBox.innerHTML = '<i class="fas fa-plug"></i> خطأ في الاتصال بالسيرفر';
                btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
