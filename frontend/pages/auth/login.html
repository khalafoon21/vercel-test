<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | تسجيل الدخول</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        error: { 500: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style> body { background-color: #F9FAFB; } .smooth-transition { transition: all 0.2s ease-out; } </style>
</head>
<body class="font-sans text-gray-800 antialiased flex items-center justify-center min-h-screen relative overflow-hidden">
    <script src="../../components/app-state.js"></script>
    <script src="../../components/ui-feedback.js"></script>

    <div class="absolute top-0 right-0 w-64 h-64 bg-primary-50 rounded-bl-full -z-10 opacity-50"></div>
    <div class="absolute bottom-0 left-0 w-48 h-48 bg-primary-50 rounded-tr-full -z-10 opacity-50"></div>

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-100 z-10">
        <div class="text-center mb-8">
            <a href="../../index.html" class="text-3xl font-bold tracking-wider text-primary-600 hover:text-primary-700 transition">
                Spider<span class="text-secondary-500">Store</span>
            </a>
            <h2 class="text-xl font-semibold mt-4 text-gray-700">مرحباً بك مجدداً!</h2>
            <p class="text-gray-500 text-sm mt-1">سجل دخولك لمتابعة التسوق</p>
        </div>

        <div id="messageBox" class="hidden text-sm px-4 py-2 rounded-md mb-4 text-center font-medium transition-all"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">البريد الإلكتروني</label>
                <div class="relative">
                    <input type="email" id="email" required placeholder="example@email.com" 
                        class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 text-left transition-colors" dir="ltr">
                    <i class="fas fa-envelope absolute right-3 top-3 text-gray-400"></i>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-1">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500 text-left transition-colors" dir="ltr">
                    <i class="fas fa-lock absolute right-3 top-3 text-gray-400"></i>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-2.5 px-4 rounded-md shadow-sm smooth-transition flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            ليس لديك حساب؟ <a href="register.html" class="text-primary-600 hover:text-primary-700 font-bold transition-colors">سجل الآن</a>
        </div>
        <div class="mt-3 text-center text-sm">
            <a href="forgot-password.html" class="text-gray-500 hover:text-primary-600 font-bold transition-colors">نسيت كلمة المرور؟</a>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // 1. فحص هل المستخدم مسجل دخول بالفعل أم لا
        window.addEventListener('DOMContentLoaded', () => {
            if((window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token'))) {
                window.location.replace('../../index.html');
            }
        });

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('messageBox');
            const btn = document.getElementById('submitBtn');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            btn.disabled = true;
            msgBox.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    if (window.AppState) window.AppState.setToken(data.token);
                    else localStorage.setItem('spider_token', data.token);
                    await syncGuestCart(data.token);
                    
                    msgBox.className = 'block bg-success-50 text-success-600 border border-success-200 text-sm px-4 py-2 rounded-md mb-4 text-center font-bold';
                    msgBox.innerHTML = '<i class="fas fa-check-circle"></i> تم تسجيل الدخول بنجاح!';
                    if (window.AppUI) window.AppUI.toast('\u062a\u0645 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644 \u0628\u0646\u062c\u0627\u062d', 'success');
                    
                    setTimeout(() => {
                        window.location.href = '../../index.html';
                    }, 1000);
                } else {
                    msgBox.className = 'block bg-error-50 text-error-600 border border-error-200 text-sm px-4 py-2 rounded-md mb-4 text-center font-bold';
                    msgBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${escapeHTML(data.message) || 'خطأ في البريد أو كلمة المرور'}`;
                    if (window.AppUI) window.AppUI.modal({ type: 'error', title: '\u062a\u0639\u0630\u0631 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644', message: data.message || '\u062e\u0637\u0623 \u0641\u064a \u0627\u0644\u0628\u0631\u064a\u062f \u0623\u0648 \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631' });
                    
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                    btn.disabled = false;
                }
            } catch (error) {
                msgBox.className = 'block bg-error-50 text-error-600 border border-error-200 text-sm px-4 py-2 rounded-md mb-4 text-center font-bold';
                msgBox.innerHTML = '<i class="fas fa-plug"></i> خطأ في الاتصال بالسيرفر';
                if (window.AppUI) window.AppUI.modal({ type: 'error', title: '\u062e\u0637\u0623 \u0641\u064a \u0627\u0644\u0627\u062a\u0635\u0627\u0644', message: '\u062a\u0623\u0643\u062f \u0623\u0646 \u0627\u0644\u0633\u064a\u0631\u0641\u0631 \u064a\u0639\u0645\u0644 \u062b\u0645 \u062d\u0627\u0648\u0644 \u0645\u0631\u0629 \u0623\u062e\u0631\u0649.' });
                
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                btn.disabled = false;
            }
        }

        async function syncGuestCart(token) {
            let localCart = [];
            try { localCart = window.AppState ? window.AppState.getCart() : JSON.parse(localStorage.getItem('spider_cart') || '[]'); } catch (error) { localCart = []; }
            if (!Array.isArray(localCart) || localCart.length === 0) return;

            for (const item of localCart) {
                const productId = Number(item.product_id || item.id);
                const quantity = Number(item.quantity || 1);
                if (!productId || quantity <= 0) continue;
                try {
                    await fetch(`${API_URL}/cart`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ product_id: productId, quantity })
                    });
                } catch (error) {}
            }
            if (window.AppState) window.AppState.clearCart();
            else localStorage.removeItem('spider_cart');
        }
    </script>
</body>
</html>
