<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | الرئيسية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 100: '#CFFAFE', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E', 100: '#DCFCE7', 600: '#16A34A' },
                        error: { 500: '#EF4444', 100: '#FEE2E2', 600: '#DC2626' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #F9FAFB; }
        .smooth-transition { transition: all 0.3s ease-in-out; }
        .fade-in { animation: fadeIn 0.6s ease-in-out; }

        @keyframes fadeIn { 
            from { opacity: 0.5; } 
            to   { opacity: 1; } 
        }

        @keyframes shrinkProgress { 
            from { width: 100%; } 
            to   { width: 0%; } 
        }
        .animate-progress { animation: shrinkProgress 3s linear forwards; }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <div id="navbar-container"></div>
    <script src="components/app-state.js"></script>
    <script src="components/ui-feedback.js"></script>
    <script src="components/main-navbar.js" defer></script>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none" aria-live="polite"></div>

    <div class="container mx-auto px-4 lg:px-8 py-8 flex flex-col md:flex-row gap-8">
        
        <aside class="w-full md:w-64 order-2 md:order-1">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-24">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <i class="fas fa-th-large text-primary-500"></i> الأقسام
                    </h2>
                    <a href="index.html" class="text-sm text-primary-500 hover:underline">الكل</a>
                </div>
                <nav id="categoriesList" aria-label="أقسام المنتجات">
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 p-3"><div class="skeleton w-10 h-10 rounded-lg"></div><div class="skeleton h-4 w-3/4"></div></div>
                        <div class="flex items-center gap-3 p-3"><div class="skeleton w-10 h-10 rounded-lg"></div><div class="skeleton h-4 w-3/4"></div></div>
                    </div>
                </nav>
            </div>
        </aside>

        <main class="flex-1 order-1 md:order-2">
            
            <section id="heroContainer" class="relative overflow-hidden rounded-3xl shadow-lg mb-12 hidden min-h-[320px] md:min-h-[360px]">
                <div id="sliderContent" class="w-full fade-in h-full min-h-[320px] md:min-h-[360px]"></div>
                <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex gap-2 z-20" id="sliderDots"></div>
            </section>

            <section id="latestSection" class="mb-12">
                <div class="flex items-center mb-6 border-r-4 border-secondary-500 pr-3">
                    <h2 id="latestTitle" class="text-2xl font-bold text-gray-900">وصل حديثاً</h2>
                </div>
                <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <section id="bestSellersSection">
                <div class="flex items-center mb-6 border-r-4 border-primary-500 pr-3">
                    <h2 class="text-2xl font-bold text-gray-900">الأكثر مبيعاً</h2>
                </div>
                <div id="bestSellersGrid" class="grid grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

        </main>
    </div>

    <footer class="bg-gray-900 text-white py-12 text-center mt-auto">
        <div class="container mx-auto px-4">
            <h2 class="text-2xl font-bold text-primary-500 mb-4">Spider Store</h2>
            <p class="text-gray-400 mb-8 max-w-md mx-auto">وجهتك الأولى لأفضل إكسسوارات الألعاب في مصر.</p>
            <div class="flex justify-center gap-6 mb-8 text-2xl">
                <a href="#" class="hover:text-primary-500 transition-colors"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-primary-500 transition-colors"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-primary-500 transition-colors"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="text-gray-500 text-sm">© 2026 Spider Store. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script>
    (() => {
        'use strict';

        // الإعدادات
        const BASE_SERVER = window.location.origin;
        const API_URL = '/api';
        const TOKEN_KEY = 'spider_token';   
        
        // جلب مسار الصفحة الحالي لمعرفة الفلتر
        const urlParams = new URLSearchParams(window.location.search);
        const currentCategoryId = urlParams.get('category');
        const searchQuery = urlParams.get('search');

        // حالة الـ Slider
        let banners = [];
        let currentSlide = 0;
        let sliderInterval = null;   

        // أدوات مساعدة
        const escapeHTML = str => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
        const safeNumber = value => Number.isFinite(Number(value)) ? Number(value) : 0;
        const safeId = value => encodeURIComponent(String(value || ''));
        const safeIconClass = value => String(value || 'fa-tags').split(/\s+/).filter(cls => /^fa[-\w]*$/.test(cls)).join(' ') || 'fa-tags';
        const safeColor = (value, fallback) => /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || '')) ? value : fallback;
        const safeLink = value => {
            const link = String(value || '').trim();
            if (!link) return '#';
            if (/^(https?:\/\/|\.{0,2}\/|#|\?)/i.test(link) && !/^javascript:/i.test(link)) return escapeHTML(link);
            return '#';
        };
        const buildImageUrl = imagePath => {
            const cleanPath = String(imagePath || '').trim();
            if (!cleanPath) return 'https://via.placeholder.com/300?text=No+Image';
            return /^https?:\/\//i.test(cleanPath) ? cleanPath : `${BASE_SERVER}${cleanPath.startsWith('/') ? cleanPath : `/${cleanPath}`}`;
        };
        const getProductImage = product => {
            if (product.image_url || product.image) return product.image_url || product.image;
            if (Array.isArray(product.images_array) && product.images_array.length) return product.images_array[0];
            if (Array.isArray(product.images_list) && product.images_list.length) return product.images_list[0];
            if (typeof product.images === 'string' && product.images.trim()) {
                try {
                    const parsed = JSON.parse(product.images);
                    if (Array.isArray(parsed) && parsed.length) return parsed[0];
                } catch (error) {
                    return product.images.split(/[,\n]/).find(Boolean) || '';
                }
            }
            return '';
        };
        const calcFinalPrice = (price, discount) => {
            const basePrice = safeNumber(price);
            const discountValue = safeNumber(discount);
            return (discountValue > 0 && discountValue <= 100) ? (basePrice - (basePrice * discountValue / 100)).toFixed(0) : basePrice.toFixed(0);
        };

        function renderProductsSkeleton(containerId, count = 6) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = Array(count).fill(`
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col">
                    <div class="skeleton w-full aspect-square"></div>
                    <div class="p-5 flex flex-col gap-3">
                        <div class="skeleton h-4 w-3/4"></div>
                        <div class="skeleton h-3 w-1/2"></div>
                        <div class="skeleton h-6 w-1/3 mt-2"></div>
                    </div>
                </div>
            `).join('');
        }

        async function initPage() {
            renderProductsSkeleton('productsGrid');
            renderProductsSkeleton('bestSellersGrid', 3);

            await Promise.allSettled([
                fetchBanners(),
                fetchCategories(),
                fetchProducts()
            ]);
        }

        // ==========================================
        //  الـ Slider
        // ==========================================
        async function fetchBanners() {
            try {
                const res = await fetch(`${API_URL}/banners`);
                const data = await res.json();
                if (data.success && data.data?.length > 0) {
                    banners = data.data;
                    document.getElementById('heroContainer').classList.remove('hidden');
                    renderSlider();
                    startSliderTimer();
                }
            } catch (err) { console.error('Banners fetch error', err); }
        }

        function renderSlider() {
            const container = document.getElementById('sliderContent');
            if (!banners[currentSlide]) return;
            const slide = banners[currentSlide];
            const bgColor = safeColor(slide.bg_color, '#ffffff');
            const textColor = safeColor(slide.text_color, '#1f2937');
            const buttonColor = safeColor(slide.button_color, '#0891b2');

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-[1fr_0.9fr] items-center gap-4 md:gap-8 p-6 sm:p-8 md:p-10 min-h-[320px] md:min-h-[360px] w-full relative" style="background-color: ${bgColor};">
                    <div class="z-10 text-right max-w-xl" style="color: ${textColor};">
                        <h2 class="text-2xl sm:text-3xl md:text-5xl font-extrabold mb-3 leading-tight">${escapeHTML(slide.title)}</h2>
                        <p class="text-sm sm:text-base md:text-lg mb-6 max-w-lg opacity-90 leading-8">${escapeHTML(slide.description)}</p>
                        <a href="${safeLink(slide.link_url)}" class="inline-flex items-center justify-center font-bold py-3 px-7 sm:px-9 rounded-full shadow-lg hover:scale-105 transition-transform text-white min-w-36" style="background-color: ${buttonColor};">
                            ${escapeHTML(slide.button_text) || 'اكتشف الآن'}
                        </a>
                    </div>
                    <div class="z-10 w-full h-44 sm:h-56 md:h-72 flex items-center justify-center md:justify-end overflow-hidden">
                        <img src="${buildImageUrl(slide.image_url)}" class="max-w-full max-h-full object-contain drop-shadow-xl" alt="${escapeHTML(slide.title) || 'Banner'}" onerror="this.src='https://via.placeholder.com/600x320?text=Banner'">
                    </div>
                </div>
            `;

            document.getElementById('sliderDots').innerHTML = banners.map((_, i) => `
                <button type="button" onclick="window.goToSlide(${i})" class="w-3 h-3 rounded-full border border-gray-400 ${i === currentSlide ? 'bg-gray-600 w-8' : 'bg-transparent'} smooth-transition"></button>
            `).join('');
        }

        function startSliderTimer() {
            if (sliderInterval) clearInterval(sliderInterval);
            sliderInterval = setInterval(() => window.goToSlide((currentSlide + 1) % banners.length), 5000);
        }

        window.goToSlide = function(index) {
            currentSlide = index;
            renderSlider();
            startSliderTimer(); 
        };

        // ==========================================
        //  الأقسام والمنتجات
        // ==========================================
        async function fetchCategories() {
            const list = document.getElementById('categoriesList');
            try {
                const res = await fetch(`${API_URL}/categories`);
                const data = await res.json();
                if (data.success && data.data?.length > 0) {
                    list.innerHTML = data.data.map(cat => {
                        const isActive = currentCategoryId == cat.id;
                        const activeClasses = isActive ? "bg-primary-50 text-primary-600 border-primary-100" : "hover:bg-primary-50 hover:text-primary-600 border-transparent hover:border-primary-100 text-gray-700";
                        const activeIconBg = isActive ? "bg-white text-primary-500 shadow-sm" : "bg-gray-50 text-gray-500 group-hover:bg-white group-hover:text-primary-500 shadow-sm";
                        
                        return `
                        <a href="?category=${safeId(cat.id)}" class="flex items-center gap-3 p-3 rounded-xl transition-all group border ${activeClasses}">
                            <span class="w-10 h-10 rounded-lg flex items-center justify-center transition-all ${activeIconBg}">
                                <i class="fas ${safeIconClass(cat.icon)}"></i>
                            </span>
                            <span class="font-bold">${escapeHTML(cat.name)}</span>
                        </a>`;
                    }).join('');
                }
            } catch (err) { list.innerHTML = '<p class="text-sm text-error-500 p-2">تعذر تحميل الأقسام.</p>'; }
        }

        async function fetchProducts() {
            const grid = document.getElementById('productsGrid');
            const bestSellersGrid = document.getElementById('bestSellersGrid');
            const latestSection = document.getElementById('latestSection');
            const bestSellersSection = document.getElementById('bestSellersSection');
            
            try {
                let apiUrl = `${API_URL}/products`;
                const queryParams = [];
                if (currentCategoryId) queryParams.push(`category_id=${encodeURIComponent(currentCategoryId)}`);
                if (searchQuery) queryParams.push(`search=${encodeURIComponent(searchQuery)}`);
                if (queryParams.length > 0) apiUrl += `?${queryParams.join('&')}`;

                const res = await fetch(apiUrl);
                const data = await res.json();

                if (data.success && data.data?.length > 0) {
                    if (currentCategoryId || searchQuery) {
                        document.getElementById('latestTitle').innerText = 'نتائج البحث / التصنيف';
                        bestSellersSection.style.display = 'none'; 
                    }

                    renderProductCards(data.data, grid);

                    if (!currentCategoryId && !searchQuery && bestSellersGrid) {
                        renderProductCards(data.data.slice(0, 3), bestSellersGrid); 
                    }
                } else {
                    grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">لا توجد منتجات مطابقة.</p>';
                    if(bestSellersGrid) bestSellersGrid.innerHTML = '';
                }
            } catch (err) { 
                grid.innerHTML = '<p class="col-span-full text-center text-error-500 py-8">حدث خطأ في الاتصال.</p>';
                if(bestSellersGrid) bestSellersGrid.innerHTML = '';
            }
        }

        function renderProductCards(productsArray, container) {
            container.innerHTML = productsArray.map(product => {
                const productId = safeId(product.id);
                const price = safeNumber(product.price);
                const discount = safeNumber(product.discount);
                const hasDiscount = discount > 0;
                const rating = Math.max(0, Math.min(5, Math.floor(safeNumber(product.average_rating || 4))));
                const stars = '<i class="fas fa-star"></i>'.repeat(rating) + '<i class="far fa-star text-gray-300"></i>'.repeat(5 - rating);

                return `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition-all group flex flex-col h-full relative">
                    <div class="relative p-4 bg-gray-50 flex justify-center items-center">
                        ${hasDiscount ? `<span class="absolute top-3 left-3 bg-error-500 text-white text-xs font-bold px-3 py-1 rounded-full z-10">خصم ${discount}%</span>` : ''}
                        <a href="pages/products/product.html?id=${productId}" class="w-full">
                            <img src="${buildImageUrl(getProductImage(product))}" class="w-full aspect-square object-contain group-hover:scale-110 transition-transform duration-500" alt="${escapeHTML(product.title)}" onerror="this.onerror=null;this.src='https://via.placeholder.com/300?text=No+Image'">
                        </a>
                    </div>
                    <div class="p-5 flex flex-col flex-1">
                        <a href="pages/products/product.html?id=${productId}" class="hover:text-primary-600 transition-colors">
                            <h3 class="font-bold text-gray-800 mb-1 line-clamp-2">${escapeHTML(product.title)}</h3>
                        </a>
                        <div class="flex items-center text-secondary-500 text-xs mb-3">
                            ${stars} <span class="text-gray-400 mr-2">(${safeNumber(product.reviews_count)})</span>
                        </div>
                        <div class="mt-auto flex items-center justify-between">
                            <div class="flex flex-col">
                                ${hasDiscount ? `<span class="text-gray-400 line-through text-xs">${price.toFixed(0)} ج.م</span>` : ''}
                                <span class="text-primary-600 font-bold text-xl">${calcFinalPrice(price, discount)} ج.م</span>
                            </div>
                            <button type="button" data-action="add-to-cart" data-product-id="${productId}" class="add-to-cart-btn bg-primary-500 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-primary-600 shadow-lg shadow-primary-200 transition-all z-20">
                                <i class="fas fa-cart-plus pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ==========================================
        //  الإضافة المباشرة للباك اند (Hybrid Model)
        // ==========================================
        window.addToCart = async function(button, id) {
            const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem(TOKEN_KEY) || localStorage.getItem('token')); 
            
            if (!token) {
                addGuestCartItem(id, 1);
                showToast("تمت إضافة المنتج لسلة الزائر");
                if (typeof window.updateGlobalCartCount === 'function') window.updateGlobalCartCount();
                return;
            }

            if (button) {
                button.dataset.busy = '1';
                button.style.opacity = '0.5';
                button.disabled = true;
            }

            try {
                const response = await fetch(`${API_URL}/cart`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ product_id: parseInt(id), quantity: 1 })
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showToast("تم إضافة المنتج للسلة بنجاح!");
                    // تحديث العداد من السيرفر مباشرة عبر دالة الناف بار المحدثة
                    if (typeof window.updateGlobalCartCount === 'function') {
                        window.updateGlobalCartCount();
                    }
                } else {
                    showToast(data.message || "حدث خطأ أثناء الإضافة", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("خطأ في الاتصال بالخادم", "error");
            } finally {
                if (button) {
                    button.dataset.busy = '0';
                    button.style.opacity = '1';
                    button.disabled = false;
                }
            }
        };

        window.handleProductCardCartClick = function(event, button) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
            }
            if (!button || button.dataset.busy === '1') return false;
            window.addToCart(button, button.dataset.productId);
            return false;
        };

        function addGuestCartItem(id, quantity) {
            const productId = Number(id);
            if (!productId) return;
            if (window.AppState) {
                window.AppState.addCartItem(productId, quantity);
                return;
            }
            let cart = [];
            try { cart = JSON.parse(localStorage.getItem('spider_cart') || '[]'); } catch (error) { cart = []; }
            const existing = cart.find(item => Number(item.id || item.product_id) === productId);
            if (existing) existing.quantity = Number(existing.quantity || 0) + quantity;
            else cart.push({ id: productId, product_id: productId, quantity });
            localStorage.setItem('spider_cart', JSON.stringify(cart));
        }

        ['pointerdown', 'mousedown', 'touchstart', 'click'].forEach(eventName => {
            document.addEventListener(eventName, event => {
                const button = event.target.closest('[data-action="add-to-cart"]');
                if (!button) return;
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
                if (eventName === 'click') window.handleProductCardCartClick(event, button);
            }, true);
        });

        document.addEventListener('submit', event => {
            if (event.target && event.target.closest('#productsGrid, #bestSellersGrid')) {
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
            }
        }, true);

        document.addEventListener('click', event => {
            const button = event.target.closest('[data-action="add-to-cart"]');
            if (!button) return;
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
            window.handleProductCardCartClick(event, button);
        }, true);

        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            
            toast.className = `pointer-events-auto relative overflow-hidden bg-white/95 backdrop-blur-md border-r-4 ${isSuccess ? 'border-success-500' : 'border-error-500'} shadow-[0_8px_30px_rgb(0,0,0,0.12)] rounded-xl w-80 transform transition-all duration-500 translate-x-full opacity-0 flex p-4 items-center gap-4`;
            
            toast.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${isSuccess ? 'bg-success-100 text-success-600' : 'bg-error-100 text-error-600'}">
                    <i class="fas ${isSuccess ? 'fa-check' : 'fa-exclamation'} text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm">${isSuccess ? 'تم بنجاح' : 'تنبيه'}</h4>
                    <p class="text-xs text-gray-500 font-medium mt-0.5 leading-relaxed">${escapeHTML(message)}</p>
                </div>
                <button type="button" class="flex-shrink-0 text-gray-400 hover:text-gray-700" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-gray-100">
                    <div class="h-full ${isSuccess ? 'bg-success-500' : 'bg-error-500'} animate-progress"></div>
                </div>
            `;
            
            container.appendChild(toast);
            requestAnimationFrame(() => setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10));
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        window.addEventListener('load', initPage);
    })();
    </script>
</body>
</html>
